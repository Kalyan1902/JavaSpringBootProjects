
<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Dashboard - Vehicle Insurance</title>

    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="fragments/customer-header :: header('home')"></div>

<div class="container">
    <h4 class="page-title" style="font-size: 1.6rem; font-weight: 600; margin-bottom: 10px;">Dashboard</h4>
    <p class="subtext" style="font-size: 0.95rem; color: #666; margin-bottom: 25px;">Welcome back! Here's an overview of your account</p>

    <div class="grid-4">

        <div class="card stat stat-blue" style="padding: 20px; border-radius: 8px;">
            <div>
                <div class="label" style="font-weight: 600; font-size: 0.9rem;">
                    Total Vehicles
                </div>
                <div class="value" style="font-weight: 600; font-size: 1.8rem;" th:text="${totalVehicles}">0</div>
            </div>
        </div>

        <div class="card stat stat-green" style="padding: 20px; border-radius: 8px;">
            <div>
                <div class="label" style="font-weight: 600; font-size: 0.9rem;">
                    Active Policies
                </div>
                <div class="value" style="font-weight: 600; font-size: 1.8rem;" th:text="${activePolicies}">0</div>
            </div>
        </div>

        <div class="card stat stat-yellow" style="padding: 20px; border-radius: 8px;">
            <div>
                <div class="label" style="font-weight: 600; font-size: 0.9rem;">
                    Total Claims
                </div>
                <div class="value" style="font-weight: 600; font-size: 1.8rem;" th:text="${totalClaims}">0</div>
            </div>
        </div>

        <div class="card stat stat-grey" style="padding: 20px; border-radius: 8px;">
            <div>
                <div class="label" style="font-weight: 600; font-size: 0.9rem;">
                    Total Premium
                </div>
                <div class="value" style="font-weight: 600; font-size: 1.8rem;" th:text="${totalPremium}">0</div>
            </div>
        </div>

    </div>

    <div class="card" style="margin-top:25px; padding: 25px; border: 1px solid #eee; border-radius: 8px;">
        <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 20px;">
            Quick Actions
        </div>

        <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <a class="btn" th:href="@{/customer/vehicles}" style="padding: 10px 20px; font-size: 0.9rem; font-weight: 600; border-radius: 4px; background: #f8faff; border: 1px solid #e0e6ed; color: #333; text-decoration: none;">
                Manage Vehicles
            </a>
            <a class="btn" th:href="@{/customer/policies}" style="padding: 10px 20px; font-size: 0.9rem; font-weight: 600; border-radius: 4px; background: #f8faff; border: 1px solid #e0e6ed; color: #333; text-decoration: none;">
                View Policies
            </a>
            <a class="btn" th:href="@{/customer/claims}" style="padding: 10px 20px; font-size: 0.9rem; font-weight: 600; border-radius: 4px; background: #f8faff; border: 1px solid #e0e6ed; color: #333; text-decoration: none;">
                File Claim
            </a>
            <a class="btn" th:href="@{/customer/reports}" style="padding: 10px 20px; font-size: 0.9rem; font-weight: 600; border-radius: 4px; background: #f8faff; border: 1px solid #e0e6ed; color: #333; text-decoration: none;">
                Reports
            </a>
        </div>
    </div>

</div>

</body>
</html>
