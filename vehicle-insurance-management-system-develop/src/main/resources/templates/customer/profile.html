<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Profile - Vehicle Insurance</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="fragments/customer-header :: header('')"></div>


<div class="container">
    <h4 class="page-title" style="font-size: 1.6rem; font-weight: 600; margin-bottom: 5px;">My Profile</h4>
    <p class="subtext" style="font-size: 0.9rem; color: #666;">Manage your personal information and contact details</p>

    <div class="card profile-dashboard" style="display: flex; align-items: center; padding: 30px; margin-bottom: 30px; border: 1px solid #eee; border-radius: 8px;">
        <div class="profile-avatar" style="background: black; color: white; width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 600; margin-right: 25px;">
            <span th:text="${#strings.substring(customer.name,0,1).toUpperCase()}">N</span>
        </div>

        <div class="profile-info">
            <h2 th:text="${customer.name}" style="margin: 0 0 8px 0; font-size: 20px; font-weight: 600;">nani</h2>
            <div style="color: #555; line-height: 1.8; font-size: 0.95rem;">
                <div>
                    <i class="bi bi-envelope-at" style="color: #7b68ee; margin-right: 10px;"></i>
                    <span th:text="${customer.email}">nani@gmail.com</span>
                </div>
                <div>
                    <i class="bi bi-phone" style="color: #7b68ee; margin-right: 10px;"></i>
                    <span th:text="${customer.phone}">9183282655</span>
                </div>
                <div>
                    <i class="bi bi-house" style="color: #ee6c4d; margin-right: 10px;"></i>
                    <span th:text="${customer.address}">pune</span>
                </div>
            </div>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

    <h3 class="page-title" style="font-size: 18px; font-weight: 600; margin-bottom: 15px;">Edit Information</h3>

    <div th:if="${param.saved}" class="alert success" style="margin-bottom:14px; color: green; font-size: 0.9rem;">
        Profile updated successfully!
    </div>

    <div class="card" style="padding: 20px; border: 1px solid #eee; border-radius: 8px;">
        <form th:action="@{/customer/profile}" method="post">
            <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="font-weight:600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Name</label>
                    <input style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" name="name" th:value="${customer.name}" required>
                </div>
                <div style="flex: 1;">
                    <label style="font-weight:600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Email</label>
                    <input style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background-color: #f9f9f9;" th:value="${customer.email}" disabled>
                </div>
            </div>

            <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="font-weight:600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Phone</label>
                    <input style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" name="phone" th:value="${customer.phone}">
                </div>
                <div style="flex: 1;">
                    <label style="font-weight:600; font-size: 0.9rem; display: block; margin-bottom: 5px;">Address</label>
                    <input style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" name="address" th:value="${customer.address}">
                </div>
            </div>

            <button class="btn btn-primary" style="margin-top:10px; padding: 8px 18px; font-size: 0.9rem; cursor: pointer; border-radius: 4px;" type="submit">
                Save Changes
            </button>
        </form>
    </div>
</div>

</body>
</html>
