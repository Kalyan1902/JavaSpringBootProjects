
<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>My Vehicles</title>

    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div th:replace="~{fragments/customer-header :: header('vehicles')}"></div>

<div class="container">
    <h4 class="page-title" style="font-size: 1.6rem; font-weight: 600; margin-bottom: 10px;">My Vehicles</h4>
    <p class="subtext" style="font-size: 0.95rem; color: #666; margin-bottom: 25px;">Manage your registered vehicles</p>

    <div th:if="${param.added}" class="alert success" style="margin-bottom:14px; color: green; font-size: 0.9rem;">Vehicle added successfully!</div>
    <div th:if="${param.updated}" class="alert success" style="margin-bottom:14px; color: green; font-size: 0.9rem;">Vehicle updated successfully!</div>

    <div th:if="${param.editLocked}" class="alert error" style="margin-bottom:14px; background:#fee2e2; color:#991b1b; font-size: 0.9rem; padding: 10px; border-radius: 4px;">
        Vehicle cannot be edited because an APPROVED claim exists.
    </div>

    <details class="card" th:open=${showVehicleForm}
    style="padding: 15px 25px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 25px; cursor: pointer;">
        <summary class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Add Vehicle
        </summary>

        <div style="margin-top:20px; cursor: default;">
            <form th:action="@{/customer/vehicles/add}" th:object="${vehicle}" method="post">

                <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Registration Number</label>
                        <input type="text" th:field="*{registrationNumber}" placeholder="e.g. ABC123" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <small th:if="${#fields.hasErrors('registrationNumber')}" th:errors="*{registrationNumber}" style="color: red; font-size: 0.8rem;"></small>
                    </div>

                    <div style="flex: 1;">
                        <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Vehicle Type</label>
                        <select th:field="*{vehicleType}" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: white;">
                            <option value="" disabled selected>Select type</option>
                            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                        </select>
                        <small th:if="${#fields.hasErrors('vehicleType')}" th:errors="*{vehicleType}" style="color: red; font-size: 0.8rem;"></small>
                    </div>
                </div>

                <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Make</label>
                        <input type="text" th:field="*{make}" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <small th:if="${#fields.hasErrors('make')}" th:errors="*{make}" style="color: red; font-size: 0.8rem;"></small>
                    </div>

                    <div style="flex: 1;">
                        <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Model</label>
                        <input type="text" th:field="*{model}" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <small th:if="${#fields.hasErrors('model')}" th:errors="*{model}" style="color: red; font-size: 0.8rem;"></small>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Year of Manufacture</label>
                    <input type="number" min="1980" max="2100" th:field="*{yearOfManufacture}" required style="width: 100%; max-width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    <small th:if="${#fields.hasErrors('yearOfManufacture')}" th:errors="*{yearOfManufacture}" style="color: red; font-size: 0.8rem;"></small>
                </div>

                <button class="btn btn-primary" type="submit" style="padding: 10px 25px; font-weight: 600; border-radius: 4px; cursor: pointer;">
                    Save Vehicle
                </button>
            </form>
        </div>
    </details>

    <div class="card" style="padding: 25px; border: 1px solid #eee; border-radius: 8px;">
        <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 15px;">Vehicle List</div>

        <table class="table">
            <thead>
            <tr style="font-size: 0.9rem;">
                <th>Registration</th>
                <th>Make</th>
                <th>Model</th>
                <th>Year</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody style="font-size: 0.95rem;">
            <tr th:each="v : ${vehicles}">
                <td th:text="${v.registrationNumber}" style="font-weight: 600;"></td>
                <td th:text="${v.make}"></td>
                <td th:text="${v.model}"></td>
                <td th:text="${v.yearOfManufacture}"></td>

                <td>
                    <span class="badge vehicle-type"
                          style="font-weight: 600; font-size: 0.75rem;"
                          th:text="${v.vehicleType}"
                          th:classappend="' ' + ${v.vehicleType.name().toLowerCase()}">
                    </span>
                </td>

                <td>
                    <a class="btn"
                       th:if="${!editDisabled[v.vehicleId]}"
                       th:href="@{'/customer/vehicles/' + ${v.vehicleId} + '/edit'}"
                       style="padding: 6px 12px; font-size: 0.85rem; background: #f8faff; border: 1px solid #ddd; border-radius: 4px; text-decoration: none; color: #333;">
                        <i class="bi bi-pencil"></i> Edit
                    </a>

                    <button class="btn" type="button"
                            th:if="${editDisabled[v.vehicleId]}"
                            disabled
                            style="padding: 6px 12px; font-size: 0.85rem; opacity:.6; cursor:not-allowed; background: #f8faff; border: 1px solid #ddd; border-radius: 4px;"
                            title="Edit disabled because an approved claim exists for this vehicle">
                        <i class="bi bi-lock"></i> Edit
                    </button>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(vehicles)}">
                <td colspan="6" style="color:var(--muted); padding: 20px; text-align: center;">
                    No vehicles added yet.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
