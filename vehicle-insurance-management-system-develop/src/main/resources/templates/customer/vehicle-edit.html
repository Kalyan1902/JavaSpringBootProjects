
<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Edit Vehicle</title>

    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div th:replace="~{fragments/customer-header :: header('vehicles')}"></div>

<div class="container">
    <h4 class="page-title" style="font-size: 1.6rem; font-weight: 600; margin-bottom: 10px;">Edit Vehicle</h4>
    <p class="subtext" style="font-size: 0.95rem; color: #666; margin-bottom: 25px;">Update your vehicle details</p>

    <div class="card" style="padding: 25px; border: 1px solid #eee; border-radius: 8px;">

        <form th:action="@{/customer/vehicles/{id}/edit(id=${id})}"
              th:object="${vehicle}"
              method="post">

            <div th:if="${#fields.hasAnyErrors()}" class="alert error" style="margin-bottom:15px; font-size: 0.85rem; padding: 10px; border-radius: 4px;">
                Please correct the highlighted errors.
            </div>

            <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Registration Number</label>
                    <input type="text" th:field="*{registrationNumber}" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    <small th:if="${#fields.hasErrors('registrationNumber')}"
                           th:errors="*{registrationNumber}" style="color: red; font-size: 0.8rem;"></small>
                </div>

                <div style="flex: 1;">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Vehicle Type</label>
                    <select th:field="*{vehicleType}" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: white;">
                        <option value="" disabled>Select type</option>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
                    </select>
                    <small th:if="${#fields.hasErrors('vehicleType')}"
                           th:errors="*{vehicleType}" style="color: red; font-size: 0.8rem;"></small>
                </div>
            </div>

            <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Make</label>
                    <input type="text" th:field="*{make}" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    <small th:if="${#fields.hasErrors('make')}" th:errors="*{make}" style="color: red; font-size: 0.8rem;"></small>
                </div>
                <div style="flex: 1;">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Model</label>
                    <input type="text" th:field="*{model}" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                    <small th:if="${#fields.hasErrors('model')}" th:errors="*{model}" style="color: red; font-size: 0.8rem;"></small>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Year of Manufacture</label>
                <input type="number" min="1980" max="2100" th:field="*{yearOfManufacture}" required style="width: 100%; max-width: 250px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <small th:if="${#fields.hasErrors('yearOfManufacture')}"
                       th:errors="*{yearOfManufacture}" style="color: red; font-size: 0.8rem;"></small>
            </div>

            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="btn btn-primary" type="submit" style="padding: 8px 24px; font-weight: 600; border-radius: 4px; cursor: pointer;">Save Changes</button>
                <a class="btn" th:href="@{/customer/vehicles}" style="padding: 8px 24px; font-weight: 600; border-radius: 4px; text-decoration: none; border: 1px solid #ddd; color: #333; background: #fff;">Back</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
