
<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Policy Report - Vehicle Insurance</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{fragments/customer-header :: header('reports')}"></div>

<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px; margin-bottom: 25px;">
        <div>
            <h4 class="page-title" style="font-size: 1.6rem; font-weight: 600; margin-bottom: 5px;">Policy Report</h4>
            <p class="subtext" style="font-size: 0.95rem; color: #666;">Comprehensive overview of your policies</p>
        </div>

        <a class="btn" th:href="@{/customer/reports}" style="padding: 8px 16px; font-size: 0.85rem; border-radius: 4px; text-decoration: none; border: 1px solid #ddd; color: #333; background: #fff;">
            <i class="bi bi-arrow-left"></i> Back to Reports
        </a>
    </div>

    <div class="card" style="padding: 25px; border: 1px solid #eee; border-radius: 8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <div></div>

            <div style="display:flex;gap:12px;">
                <a class="btn" th:href="@{/customer/reports/policies/pdf}" style="padding: 6px 15px; font-size: 0.85rem; background: #f8faff; border: 1px solid #ddd; border-radius: 4px; color: #333;">PDF</a>
                <a class="btn" th:href="@{/customer/reports/policies/excel}" style="padding: 6px 15px; font-size: 0.85rem; background: #f8faff; border: 1px solid #ddd; border-radius: 4px; color: #333;">Excel</a>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr style="font-size: 0.9rem;">
                <th>Policy Number</th>
                <th>Vehicle</th>
                <th>Coverage</th>
                <th>Premium</th>
                <th>Period</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody style="font-size: 0.95rem;">
            <tr th:each="p : ${policies}">
                <td th:text="${p.policyNumber}"></td>
                <td th:text="${p.vehicle.make + ' ' + p.vehicle.model + ' (' + p.vehicle.registrationNumber + ')'}"></td>
                <td th:text="${p.coverageAmount}"></td>
                <td th:text="${p.premiumAmount}"></td>
                <td th:text="${p.startDate + ' - ' + p.endDate}"></td>
                <td>
                    <span class="badge approved" th:if="${p.policyStatus.name()=='ACTIVE'}" style="font-weight: 600; font-size: 0.75rem;">ACTIVE</span>
                    <span class="badge" th:if="${p.policyStatus.name()=='EXPIRED'}" style="background:#f3f4f6; color:#111827; font-weight: 600; font-size: 0.75rem;">EXPIRED</span>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(policies)}">
                <td colspan="6" style="color:var(--muted); padding: 20px; text-align: center;">No policies found.</td>
            </tr>
            </tbody>
        </table>

        <div class="card" style="margin-top:25px; background:#f8faff; border: none; padding: 20px;">
            <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 15px;">Report Summary</div>

            <div style="display:flex; justify-content:space-between; gap:40px; flex-wrap: wrap;">
                <div>
                    <div style="color: #666; font-size: 0.9rem; font-weight: 600;">Total Policies</div>
                    <div style="font-size: 24px; font-weight: 600; margin-top: 5px;" th:text="${totalPolicies}">0</div>
                </div>

                <div>
                    <div style="color: #666; font-size: 0.9rem; font-weight: 600;">Active Policies</div>
                    <div style="font-size: 24px; font-weight: 600; margin-top: 5px;" th:text="${activePolicies}">0</div>
                </div>

                <div>
                    <div style="color: #666; font-size: 0.9rem; font-weight: 600;">Total Premium</div>
                    <div style="font-size: 24px; font-weight: 600; margin-top: 5px;" th:text="${totalPremium}">0</div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
