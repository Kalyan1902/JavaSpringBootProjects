
<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Customer Login - Vehicle Insurance</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --input-bg: #ffffff;
            --input-border: #ddd;
        }

        .password-group {
            display: flex;
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 6px;
            overflow: hidden;
        }

        .password-group input {
            flex-grow: 1;
            padding: 10px;
            border: none !important;
            background-color: transparent !important;
            outline: none;
            height: 42px;
        }

        .password-group .eye-addon {
            display: flex;
            align-items: center;
            padding: 0 12px;
            background-color: transparent !important;
            cursor: pointer;
            color: black !important;
            font-size: 1.1rem;
        }

        .password-group:focus-within {
            border-color: #86b7fe;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }

        input::-ms-reveal, input::-ms-clear { display: none; }

        /* Utility Alert Styles */
        .alert { padding: 10px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 12px; border: 1px solid transparent; }
        .alert-success { background-color: #d1e7dd; color: #0f5132; border-color: #badbcc; }
        .alert-error { background-color: #f8d7da; color: #842029; border-color: #f5c2c7; }
    </style>
</head>
<body class="auth-wrap">

<div class="auth-card" style="padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee;">
    <div class="auth-head">
        <img th:src="@{/images/logo.svg}" alt="logo" src=""/>
        <div>
            <h1 class="auth-title" style="font-size: 1.6rem; font-weight: 600; margin-bottom: 5px;">Vehicle Insurance</h1>
            <div class="auth-sub" style="font-size: 0.9rem; color: #666;">Customer Portal — login to manage policies and claims</div>
        </div>
    </div>

    <div th:if="${param.error != null and param.error[0] == 'true'}" class="alert alert-error">
        Invalid email or password.
    </div>

    <div th:if="${param.registered}" class="alert alert-success">
        Account created successfully. Please log in.
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        Logged out successfully.
    </div>
    <div th:if="${param.onlyCustomer}"
         class="alert alert-error">
        Only customers can log in here.
    </div>

    <form th:action="@{/customer/login}" method="post">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div style="margin-bottom:15px;">
            <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Email</label>
            <input name="username" type="email" placeholder="Enter your email"
                   style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; background-color: var(--input-bg);" required>
        </div>

        <div style="margin-bottom:20px;">
            <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Password</label>

            <div class="password-group">
                <input id="passInput" name="password" type="password" placeholder="Enter your password" required>

                <span class="eye-addon"
                      onclick="let p = document.getElementById('passInput'); p.type = p.type === 'password' ? 'text' : 'password'; this.children[0].classList.toggle('bi-eye'); this.children[0].classList.toggle('bi-eye-slash');">
                    <i class="bi bi-eye"></i>
                </span>
            </div>
        </div>

        <button class="btn btn-primary" style="width:100%; justify-content:center; padding: 12px; font-weight: 600; border-radius: 6px;" type="submit">
            Login
        </button>
    </form>

    <div class="auth-footer" style="margin-top: 20px; font-size: 0.9rem;">
        <div>New user? <a th:href="@{/customer/register}" style="color:var(--primary); font-weight: 600; text-decoration: none;">Create account</a></div>
        <div style="margin-top:10px;">Admin? <a th:href="@{/admin/login}" style="color:var(--primary); font-weight: 600; text-decoration: none;">Admin Login</a></div>
    </div>
</div>

</body>
</html>
