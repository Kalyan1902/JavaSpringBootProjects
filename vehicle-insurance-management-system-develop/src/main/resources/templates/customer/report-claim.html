<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Claim Report - Vehicle Insurance</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{fragments/customer-header :: header('reports')}"></div>

<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px; margin-bottom: 25px;">
        <div>
            <h4 class="page-title" style="font-size: 1.6rem; font-weight: 600; margin-bottom: 5px;">Claim Report</h4>
            <p class="subtext" style="font-size: 0.95rem; color: #666;">Detailed history of your claims</p>
        </div>

        <a class="btn" th:href="@{/customer/reports}" style="padding: 8px 16px; font-size: 0.85rem; border-radius: 4px; text-decoration: none; border: 1px solid #ddd; color: #333; background: #fff;">
            <i class="bi bi-arrow-left"></i> Back to Reports
        </a>
    </div>

    <div class="card" style="padding: 25px; border: 1px solid #eee; border-radius: 8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <div></div>

            <div style="display:flex;gap:12px;">
                <a class="btn" th:href="@{/customer/reports/claims/pdf}" style="padding: 6px 15px; font-size: 0.85rem; background: #f8faff; border: 1px solid #ddd; border-radius: 4px; color: #333;">PDF</a>
                <a class="btn" th:href="@{/customer/reports/claims/excel}" style="padding: 6px 15px; font-size: 0.85rem; background: #f8faff; border: 1px solid #ddd; border-radius: 4px; color: #333;">Excel</a>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr style="font-size: 0.9rem;">
                <th>Claim ID</th>
                <th>Policy Number</th>
                <th>Amount</th>
                <th>Reason</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody style="font-size: 0.95rem;">
            <tr th:each="c : ${claims}">
                <td th:text="${c.claimId}"></td>
                <td th:text="${c.policy.policyNumber}"></td>
                <td th:text="${c.claimAmount}"></td>
                <td th:text="${c.claimReason}"></td>
                <td th:text="${c.claimDate}"></td>
                <td>
                    <span class="badge submitted" th:if="${c.claimStatus.name()=='SUBMITTED'}" style="font-weight: 600; font-size: 0.75rem;">SUBMITTED</span>
                    <span class="badge approved" th:if="${c.claimStatus.name()=='APPROVED'}" style="font-weight: 600; font-size: 0.75rem;">APPROVED</span>
                    <span class="badge rejected" th:if="${c.claimStatus.name()=='REJECTED'}" style="font-weight: 600; font-size: 0.75rem;">REJECTED</span>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(claims)}">
                <td colspan="6" style="color:var(--muted); padding: 20px; text-align: center;">No claims found.</td>
            </tr>
            </tbody>
        </table>

        <div class="card" style="margin-top:25px; background:#f8faff; border: none; padding: 20px;">
            <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 15px;">Report Summary</div>

            <div style="display:flex; justify-content:space-between; gap:40px; flex-wrap: wrap;">
                <div>
                    <div style="color: #666; font-size: 0.9rem; font-weight: 600;">Total Claims</div>
                    <div style="font-size: 24px; font-weight: 600; margin-top: 5px;" th:text="${totalClaims}">0</div>
                </div>

                <div>
                    <div style="color: #666; font-size: 0.9rem; font-weight: 600;">Approved Claims</div>
                    <div style="font-size: 24px; font-weight: 600; margin-top: 5px;" th:text="${approvedClaims}">0</div>
                </div>

                <div>
                    <div style="color: #666; font-size: 0.9rem; font-weight: 600;">Total Claimed</div>
                    <div style="font-size: 24px; font-weight: 600; margin-top: 5px;" th:text="${totalClaimed}">0</div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
