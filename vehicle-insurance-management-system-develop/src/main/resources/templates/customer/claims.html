<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Claims - Vehicle Insurance</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="~{fragments/customer-header :: header('claims')}"></div>

<div class="container">
    <h4 class="page-title" style="font-size: 1.6rem; font-weight: 600; margin-bottom: 10px;">My Claims</h4>
    <p class="subtext" style="font-size: 0.95rem; color: #666; margin-bottom: 25px;">File and track your insurance claims</p>

    <div th:if="${param.submitted}" class="alert success" style="margin-bottom:14px; color: green; font-size: 0.9rem;">Claim submitted successfully!</div>

    <div class="card" style="padding: 25px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 30px;">
        <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 20px;">
            File New Claim
        </div>
        <div th:if="${claimErrorMessage}"
             class="alert alert-error"
             style="margin-bottom:12px;">
            <p th:text="${claimErrorMessage}"></p>
        </div>

        <form th:action="@{/customer/claims/file}" method="post" th:object="${claim}">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-row" style="display: flex; gap: 20px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Policy</label>
                    <select th:field="*{policyId}" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: white;" required>
                        <option value="">Select policy</option>
                        <option th:each="p : ${policies}"
                                th:value="${p.policyId}"
                                th:text="${p.policyNumber}">
                        </option>
                    </select>
                </div>

                <div style="flex: 1;">
                    <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Claim Amount</label>
                    <input th:field="*{claimAmount}" type="number" min="1" step="0.01" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" required/>
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 6px;">Claim Reason</label>
                <textarea th:field="*{claimReason}" placeholder="Describe what happened..." style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; min-height: 80px;" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary claim-submit-btn" style="padding: 10px 25px; font-weight: 600; border-radius: 4px; cursor: pointer; background-color: #0d1b2a; color: white; border: none;">
                Submit Claim
            </button>
        </form>
    </div>

    <div class="card" style="padding: 25px; border: 1px solid #eee; border-radius: 8px;">
        <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 15px;">Claims Status</div>
        <table class="table">
            <thead>
            <tr style="font-size: 0.9rem;">
                <th>Claim ID</th>
                <th>Policy Number</th>
                <th>Amount</th>
                <th>Reason</th>
                <th>Date</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody style="font-size: 0.95rem;">
            <tr th:each="c : ${claims}">
                <td th:text="${c.claimId}">1</td>
                <td th:text="${c.policy.policyNumber}">POL</td>
                <td th:text="'₹' + ${#numbers.formatDecimal(c.claimAmount, 0, 'COMMA', 2, 'POINT')}">5000</td>                <td th:text="${c.claimReason}">Reason</td>
                <td th:text="${c.claimDate}">2024-06-15</td>
                <td>
                    <span class="badge submitted" th:if="${c.claimStatus.name()=='SUBMITTED'}" style="font-weight: 600; font-size: 0.75rem; background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 4px;">SUBMITTED</span>
                    <span class="badge approved" th:if="${c.claimStatus.name()=='APPROVED'}" style="font-weight: 600; font-size: 0.75rem; background: #dcfce7; color: #15803d; padding: 4px 8px; border-radius: 4px;">APPROVED</span>
                    <span class="badge rejected" th:if="${c.claimStatus.name()=='REJECTED'}" style="font-weight: 600; font-size: 0.75rem; background: #fee2e2; color: #b91c1c; padding: 4px 8px; border-radius: 4px;">REJECTED</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(claims)}">
                <td colspan="6" style="color:#888; padding: 20px; text-align: center;">No claims found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
