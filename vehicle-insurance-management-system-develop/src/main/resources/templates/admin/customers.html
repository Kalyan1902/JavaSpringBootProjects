<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Customers - Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div th:replace="fragments/admin-header :: header('customers')"></div>

<div class="container">
    <h4 class="page-title" style="font-size: 1.6rem; font-weight: 600; margin-bottom: 10px;">Customer Management</h4>
    <p class="subtext" style="font-size: 0.95rem; color: #666; margin-bottom: 25px;">View and manage customer information</p>

    <div class="card" style="padding: 25px; border: 1px solid #eee; border-radius: 8px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
            <div style="font-weight: 600; font-size: 1.1rem;">Customer List</div>
            <div style="color: #888; font-size: 13px;">
                Total: <b style="font-weight: 600;" th:text="${#lists.size(customers)}">0</b>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr style="font-size: 0.9rem;">
                <th>Customer ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Created</th>
            </tr>
            </thead>
            <tbody style="font-size: 0.95rem;">
            <tr th:each="c : ${customers}">
                <td th:text="${c.customerId}">1</td>
                <td th:text="${c.name}">John Doe</td>
                <td th:text="${c.email}">john@example.com</td>
                <td th:text="${c.phone}">123</td>
                <td th:text="${c.address}">Address</td>
                <td th:text="${c.createdDate}">2026-01-01</td>
            </tr>

            <tr th:if="${#lists.isEmpty(customers)}">
                <td colspan="6" style="color:var(--muted); padding: 20px; text-align: center;">No customers found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
