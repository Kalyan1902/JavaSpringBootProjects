<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>File Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e6f7ff);
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            width: 420px;
            animation: fadeIn 0.4s ease;
        }
        .card h2 {
            margin-top: 0;
            font-size: 26px;
            font-weight: 600;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
        }
        .detail {
            font-size: 16px;
            margin: 12px 0;
            color: #34495e;
        }
        .detail strong {
            color: #4a69bd;
        }
        .back-btn {
            display: block;
            margin: 25px auto 0;
            background: linear-gradient(90deg, #4a69bd, #6a89cc);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }
        .back-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="card">
    <h2>📄 File Details</h2>
    <p class="detail"><strong>Name:</strong> <span th:text="${file.name}"></span></p>
    <p class="detail"><strong>Size:</strong> <span th:text="${file.formattedSize}"></span></p>
    <p class="detail"><strong>Type:</strong> <span th:text="${file.type}"></span></p>
    <p class="detail"><strong>Upload Date:</strong> <span th:text="${file.uploadDate}"></span></p>
    <p class="detail"><strong>User:</strong> <span th:text="${user.email}"></span></p>

    <a th:href="@{/user/my-files}" class="back-btn">⬅ Back to Files</a>
</div>
</body>
</html>
