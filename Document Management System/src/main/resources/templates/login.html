<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4a69bd, #6a89cc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 360px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }
        h2 {
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
            color: #2c3e50;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #4a69bd;
            outline: none;
            box-shadow: 0 0 6px rgba(74,105,189,0.3);
        }
        button {
            background: linear-gradient(90deg, #4a69bd, #6a89cc);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        .error {
            color: #e74c3c;
            margin-top: 12px;
            font-size: 14px;
        }
        .success {
            color: #27ae60;
            margin-top: 12px;
            font-size: 14px;
        }
        p {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }
        a {
            color: #4a69bd;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 Login</h2>
    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
    </form>

    <div th:if="${param.error}" class="error">
        Invalid username or password.
    </div>
    <div th:if="${param.logout}" class="success">
        You have been logged out.
    </div>
    <div th:if="${successMessage}" class="success">
        <p th:text="${successMessage}"></p>
    </div>

    <!-- Registration link -->
    <p>
        Don’t have an account? <a th:href="@{/register}">Register here</a>
    </p>
</div>
</body>
</html>
