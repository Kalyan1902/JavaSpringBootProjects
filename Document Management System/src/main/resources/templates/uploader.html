<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upload Files</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #4a69bd, #6a89cc);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .upload-container {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            width: 480px;
            animation: fadeIn 0.4s ease;
        }
        h2 {
            margin-bottom: 25px;
            font-size: 28px;
            font-weight: 600;
            color: #2c3e50;
        }
        .file-input { display: none; }
        .upload-btn {
            background: linear-gradient(90deg, #4a69bd, #6a89cc);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s;
            margin: 10px;
        }
        .upload-btn:hover { transform: scale(1.05); opacity: 0.9; }
        #dropZone {
            border: 2px dashed #4a69bd;
            border-radius: 12px;
            padding: 40px;
            margin-top: 20px;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
        }
        #dropZone.dragover {
            background: #f0f4ff;
            border-color: #6a89cc;
        }
        .message {
            margin-top: 20px;
            font-weight: 600;
            font-size: 14px;
        }
        .show-files {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: linear-gradient(90deg, #28a745, #43c47f);
            color: #fff;
            padding: 14px 22px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            transition: 0.3s;
        }
        .show-files:hover { transform: scale(1.05); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="upload-container">
    <h2>📤 Upload Files</h2>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" class="file-input" multiple />

    <!-- Buttons -->
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Choose Files</button>
    <button class="upload-btn" onclick="uploadFile()">Upload Selected</button>

    <!-- Drag & Drop zone -->
    <div id="dropZone">or Drag & Drop files here</div>

    <!-- Status message -->
    <div class="message" id="message"></div>
</div>

<!-- Show Files button -->
<a th:href="@{/user/my-files}" class="show-files">📂 Show Files</a>

<script>
    async function uploadFile(files) {
      const fileInput = document.getElementById('fileInput');
      const messageDiv = document.getElementById('message');
      const selectedFiles = files || fileInput.files;

      if (!selectedFiles.length) {
        messageDiv.textContent = "Please select a file.";
        messageDiv.style.color = "red";
        return;
      }

      const formData = new FormData();
      for (let i = 0; i < selectedFiles.length; i++) {
        formData.append("files", selectedFiles[i]);
      }

      try {
        const response = await fetch("/user/upload-multiple", {
          method: "POST",
          body: formData
        });

        if (response.ok) {
          messageDiv.textContent = "✅ Files uploaded successfully!";
          messageDiv.style.color = "green";
        } else {
          const errorText = await response.text();
          messageDiv.textContent = "❌ Upload failed: " + errorText;
          messageDiv.style.color = "red";
        }
      } catch (err) {
        messageDiv.textContent = "⚠️ Error: " + err.message;
        messageDiv.style.color = "red";
      }
    }

    const dropZone = document.getElementById("dropZone");
    dropZone.addEventListener("click", () => {
        document.getElementById("fileInput").click();
    });
    dropZone.addEventListener("dragover", e => {
        e.preventDefault();
        dropZone.classList.add("dragover");
    });
    dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
    });
    dropZone.addEventListener("drop", e => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        uploadFile(e.dataTransfer.files);
    });
</script>
</body>
</html>
