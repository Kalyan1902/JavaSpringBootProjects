<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e6f7ff);
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(90deg, #17a2b8, #20c997);
            color: #fff;
            padding: 25px;
            text-align: center;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2);
        }
        header h2 {
            margin: 0;
            font-size: 32px;
            font-weight: 600;
        }
        .container {
            max-width: 900px;
            margin: 60px auto;
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeIn 0.4s ease;
        }
        .container p {
            font-size: 18px;
            color: #34495e;
            margin-bottom: 35px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            margin: 12px;
            font-size: 16px;
        }
        .btn-primary {
            background: linear-gradient(90deg, #4a69bd, #6a89cc);
            color: #fff;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        .btn-danger {
            background: linear-gradient(90deg, #ff6b6b, #ff4757);
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .btn-danger:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        footer {
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            font-size: 14px;
            color: #777;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<header>
    <h2>👤 User Dashboard</h2>
</header>

<div class="container">
    <p>Welcome User! This is your personal file space where you can manage and access your files.</p>

    <!-- My Files button -->
    <a th:href="@{/user/my-files}" class="btn btn-primary">📂 My Files</a>

    <!-- Logout button -->
    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-danger">🚪 Logout</button>
    </form>
</div>

<footer>
    &copy; 2026 File Manager System. All rights reserved.
</footer>
</body>
</html>
